<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Goblin Watcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #e0e0e0;
      font-family: 'SF Mono', Monaco, Inconsolata, monospace;
      font-size: 13px; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column; align-items: center;
    }
    #header, #body {
      width: 100%; max-width: 1950px;
      border-left: 1px solid #333; border-right: 1px solid #333;
    }
    #header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #111;
      border-bottom: 1px solid #333; flex-shrink: 0;
    }
    .title { font-weight: bold; color: #fff; letter-spacing: .05em; }
    #status { font-size: 11px; }
    #status.live { color: #4caf50; }
    #status.error { color: #f44336; }
    #nav { display: flex; gap: 4px; margin-left: 32px; }
    .tab {
      padding: 4px 12px; cursor: pointer; border-radius: 4px;
      color: #888; font-size: 12px; user-select: none;
    }
    .tab:hover { background: #2a2a2a; color: #ccc; }
    .tab.active { background: #1d3a5e; color: #fff; }
    #record {
      margin-left: auto; padding: 4px 12px; cursor: pointer;
      border: 1px solid #444; border-radius: 4px; background: #1a1a1a;
      color: #ccc; font-family: inherit; font-size: 12px; white-space: nowrap;
    }
    #record:hover { background: #2a2a2a; }
    #record.recording { border-color: #f44336; color: #f44336; }
    #body { display: flex; flex: 1; overflow: hidden; background: #1a1a1a; }
    #sidebar {
      width: 280px; flex-shrink: 0; overflow-y: auto;
      border-right: 1px solid #333; padding: 8px 0;
    }
    #content { flex: 1; overflow: auto; }
    .row {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 8px 3px 0; cursor: pointer;
      user-select: none; white-space: nowrap;
      border-radius: 3px; margin: 0 4px;
    }
    .row:hover { background: #2a2a2a; }
    .row.selected { background: #1d3a5e; }
    .chevron { color: #555; width: 12px; text-align: center; flex-shrink: 0; }
    .dir > .name { color: #90caf9; }
    .file > .name { color: #ccc; }
    #file-path {
      padding: 8px 16px; border-bottom: 1px solid #333;
      color: #666; font-size: 11px; background: #111;
    }
    #file-body {
      padding: 16px; white-space: pre-wrap;
      word-break: break-word; line-height: 1.6; color: #ddd;
    }
    .dim { padding: 24px; color: #555; }

    /* Chat */
    #chat-view { display: none; flex-direction: column; height: 100%; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #1d3a5e; color: #fff; }
    .msg.agent { align-self: flex-start; background: #2a2a2a; color: #ddd; }
    .msg.agent.pending { color: #777; font-style: italic; }
    .msg.agent.error { background: #3a1d1d; color: #f4a; }
    #composer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #333; background: #111; flex-shrink: 0; }
    #chat-input {
      flex: 1; resize: none; background: #1a1a1a; color: #e0e0e0;
      border: 1px solid #333; border-radius: 6px; padding: 8px 10px;
      font-family: inherit; font-size: 13px; line-height: 1.4; max-height: 120px;
    }
    #chat-input:focus { outline: none; border-color: #1d3a5e; }
    #chat-send {
      align-self: flex-end; padding: 8px 16px; border: none; border-radius: 6px;
      background: #1d3a5e; color: #fff; cursor: pointer; font-family: inherit; font-size: 13px;
    }
    #chat-send:hover { background: #25497a; }
    #chat-send:disabled { background: #333; color: #777; cursor: default; }
  </style>
</head>
<body>
  <div id="header">
    <span class="title">Goblin Watcher</span>
    <span id="status"></span>
    <div id="nav">
      <span class="tab" data-view="files">Files</span>
      <span class="tab" data-view="chat">Chat</span>
    </div>
    <button id="record">● Record</button>
  </div>
  <div id="body">
    <div id="sidebar"></div>
    <div id="content">
      <div id="files-view"><div class="dim">Select a file to inspect</div></div>
      <div id="chat-view">
        <div id="messages"></div>
        <div id="composer">
          <textarea id="chat-input" rows="1" placeholder="Message the agent…"></textarea>
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
