<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Goblin Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --line: #333; --panel: #111; --bg: #0d0d0d; }
    body {
      background: var(--bg); color: #e0e0e0;
      font-family: 'SF Mono', Monaco, Inconsolata, monospace;
      font-size: 13px; height: 100vh; overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* Top bar + transport */
    #topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: var(--panel);
      border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .title { font-weight: bold; color: #fff; letter-spacing: .05em; }
    #file { color: #90caf9; font-size: 12px; }
    #meta { color: #666; font-size: 11px; }
    #transport { display: flex; align-items: center; gap: 6px; margin-left: 24px; }
    #transport button, #speed {
      background: #1a1a1a; color: #ccc; border: 1px solid #444; border-radius: 4px;
      font-family: inherit; font-size: 12px; padding: 3px 9px; cursor: pointer;
    }
    #transport button:hover, #speed:hover { background: #2a2a2a; }
    #play { min-width: 34px; }
    #position { color: #888; font-size: 11px; margin-left: 8px; white-space: nowrap; }
    #status { font-size: 11px; margin-left: auto; }
    #status.live { color: #4caf50; }
    #status.error { color: #f44336; }

    /* Main: event log + graph + inspector */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* Event log (left) */
    #event-log {
      width: 300px; flex-shrink: 0; overflow-y: auto;
      border-right: 1px solid var(--line); background: var(--panel);
    }
    .log-row {
      display: flex; gap: 8px; align-items: baseline;
      padding: 4px 10px; border-bottom: 1px solid #1c1c1c;
      cursor: pointer; white-space: nowrap; overflow: hidden;
    }
    .log-row:hover { background: #202020; }
    .log-row.active { background: #1d3a5e; }
    .log-row .l-seq { color: #555; width: 26px; text-align: right; flex-shrink: 0; }
    .log-row .l-gob { color: #90caf9; flex-shrink: 0; max-width: 84px; overflow: hidden; text-overflow: ellipsis; }
    .log-row .l-act { flex-shrink: 0; }
    .log-row .l-tgt { color: #4ec9b0; overflow: hidden; text-overflow: ellipsis; }

    /* Main center pane (goblin anatomy) */
    #graph { flex: 1; overflow: hidden; position: relative; background: #141414; }

    /* Anatomy view — every goblin's subsystems, filling the graph pane */
    .anatomy { height: 100%; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }

    .gcard {
      border: 1px solid #2a2a2a; border-radius: 8px; background: var(--panel);
      padding: 10px 12px; transition: box-shadow .2s, border-color .2s;
    }
    .gcard.selected { border-color: #4a6a8a; }
    .gcard.affected { border-color: var(--ec); box-shadow: 0 0 18px -6px var(--ec); }
    .gcard.exited { opacity: .5; }
    .gcard-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; cursor: pointer; }
    .gc-name { color: #90caf9; font-weight: bold; }
    .gc-parent { color: #666; font-size: 11px; }
    .gc-exited { color: #f4a; font-size: 10px; text-transform: uppercase; margin-left: auto; }

    .regions { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .region {
      border: 1px solid #2a2a2a; border-left: 3px solid var(--c); border-radius: 6px;
      background: #141414; padding: 7px 9px 9px; transition: box-shadow .2s, border-color .2s;
    }
    .region.empty { opacity: .4; }
    .region.active { border-color: var(--c); box-shadow: 0 0 0 1px var(--c), 0 0 16px -5px var(--c); }
    .region-head {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--c);
    }
    .region:not(.empty) .region-head { margin-bottom: 7px; }
    .region-head .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--c); flex-shrink: 0; }
    .region-head .rn { margin-left: auto; color: #666; letter-spacing: 0; }
    .tiles { display: flex; flex-wrap: wrap; gap: 5px; }
    .tile {
      font-size: 11px; color: #cfcfcf; background: #1e1e1e; border: 1px solid #333;
      border-radius: 4px; padding: 3px 8px; cursor: pointer; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tile:hover { background: #262626; border-color: var(--c); }
    .tile.touched { border-color: var(--c); color: #fff; animation: tilepulse 1s ease-out infinite; }
    @keyframes tilepulse {
      0% { box-shadow: 0 0 0 0 var(--c); }
      70% { box-shadow: 0 0 0 7px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }

    /* Inspector (right) */
    #inspector {
      width: 380px; flex-shrink: 0; overflow-y: auto;
      border-left: 1px solid var(--line); background: #1a1a1a;
    }
    #event-card { padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel); }
    #event-card .ec-head { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; margin-bottom: 8px; }
    #event-card .ec-cat { font-size: 11px; }
    #event-card .ec-cat b { font-weight: normal; }
    #event-card .ec-target { color: #4ec9b0; }
    #event-card .ec-seq { color: #555; margin-left: auto; font-size: 11px; }

    #goblin-panel .gp-head { padding: 10px 16px 8px; color: #90caf9; }
    #tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 12px 8px; }
    .tab { font-size: 11px; color: #888; padding: 2px 8px; border-radius: 3px; cursor: pointer; user-select: none; }
    .tab:hover { background: #2a2a2a; color: #ccc; }
    .tab.active { background: #1d3a5e; color: #fff; }
    .tab .n { color: #555; margin-left: 3px; }
    .tab.active .n { color: #9bd; }

    /* Slice entries (shared by event card + goblin panel) */
    .entry {
      display: grid; grid-template-columns: 150px 1fr; gap: 10px;
      padding: 4px 16px; border-bottom: 1px solid #1c1c1c; align-items: baseline;
    }
    .entry .k { color: #4ec9b0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .entry .v { color: #bbb; white-space: pre-wrap; word-break: break-word; }
    .entry.same .k, .entry.same .v { opacity: .5; }
    .entry.touched { background: #14243a; box-shadow: inset 2px 0 0 #4ec9b0; }
    .entry.added .k { color: #b5cea8; }
    .entry.removed .k { color: #f4a; text-decoration: line-through; }
    .entry .was { color: #a66; }
    .entry .now { color: #cdb87a; }
    .entry.changed .now, .entry.added .now { color: #b5cea8; }
    .entry .arrow { color: #666; margin: 0 4px; }
    .dim { padding: 16px; color: #555; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <span class="title">Goblin Visualizer</span>
      <span id="file"></span>
      <span id="meta"></span>
      <div id="transport">
        <button id="step-back" title="Step back">◀</button>
        <button id="play" title="Play/pause">▶</button>
        <button id="step-fwd" title="Step forward">▶</button>
        <select id="speed" title="Playback speed">
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
        <span id="position"></span>
      </div>
      <span id="status"></span>
    </div>
    <div id="main">
      <div id="event-log"><div class="dim">Loading…</div></div>
      <div id="graph"><div class="dim">Loading…</div></div>
      <div id="inspector">
        <div id="event-card"></div>
        <div id="goblin-panel"></div>
      </div>
    </div>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
